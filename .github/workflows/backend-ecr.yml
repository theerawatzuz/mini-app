name: Build and Push Backend to ECR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ecr.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: weather-map-backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create ECR repository if not exists
        continue-on-error: true
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: Extract metadata
        id: meta
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          # Set image tags
          if [ "$BRANCH_NAME" = "main" ]; then
            TAGS="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
            TAGS="$TAGS,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-${SHORT_SHA}"
            TAGS="$TAGS,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-${TIMESTAMP}"
          elif [ "$BRANCH_NAME" = "develop" ]; then
            TAGS="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:develop"
            TAGS="$TAGS,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev-${SHORT_SHA}"
            TAGS="$TAGS,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev-${TIMESTAMP}"
          else
            TAGS="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${BRANCH_NAME}-${SHORT_SHA}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Output image details
        run: |
          echo "Backend Image Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repository: ${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit SHA: ${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: ${{ steps.meta.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image Tags:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY

      - name: Discord notification on success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "✅ **Backend Build Success**",
              "embeds": [{
                "title": "Backend Image Pushed to ECR",
                "color": 3066993,
                "fields": [
                  {"name": "Repository", "value": "${{ env.ECR_REPOSITORY }}", "inline": true},
                  {"name": "Region", "value": "${{ env.AWS_REGION }}", "inline": true},
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "`${{ steps.meta.outputs.short_sha }}`", "inline": true},
                  {"name": "Author", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Timestamp", "value": "${{ steps.meta.outputs.timestamp }}", "inline": true},
                  {"name": "Image Tags", "value": "```${{ steps.meta.outputs.tags }}```", "inline": false},
                  {"name": "Workflow", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }' \
            https://discord.com/api/webhooks/1486690920761004093/a2sIUqGTl4KptVos4_WAaj8wIFnZgSSIlx9nLitspBM0z3qJCryw1ivUwdkVWn0u2VTe

      - name: Discord notification on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "❌ **Backend Build Failed**",
              "embeds": [{
                "title": "Backend Build Error",
                "color": 15158332,
                "fields": [
                  {"name": "Repository", "value": "${{ env.ECR_REPOSITORY }}", "inline": true},
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "`${{ github.sha }}`", "inline": true},
                  {"name": "Author", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Error", "value": "Build or push to ECR failed", "inline": false},
                  {"name": "Workflow", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }' \
            https://discord.com/api/webhooks/1486690920761004093/a2sIUqGTl4KptVos4_WAaj8wIFnZgSSIlx9nLitspBM0z3qJCryw1ivUwdkVWn0u2VTe

      - name: Update Kubernetes manifest
        if: success()
        id: update-manifest
        run: |
          git clone https://${{ secrets.GIT_TOKEN }}@github.com/theerawatzuz/terraform-eks-scg-demo.git
          cd terraform-eks-scg-demo

          NEW_IMAGE="208107894265.dkr.ecr.ap-southeast-1.amazonaws.com/weather-map-backend:prod-${{ steps.meta.outputs.timestamp }}"

          sed -i "s|image: 030635936907.dkr.ecr.ap-southeast-1.amazonaws.com/weather-map-backend:.*|image: ${NEW_IMAGE}|g" kubernetes/apps/weather-map/backend/deployment.yaml

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add kubernetes/apps/weather-map/backend/deployment.yaml
          git commit -m "chore: update backend image to prod-${{ steps.meta.outputs.timestamp }}"
          git push

          echo "new_image=$NEW_IMAGE" >> $GITHUB_OUTPUT

      - name: Discord notification - Manifest updated
        if: success() && steps.update-manifest.outcome == 'success'
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "🔄 **Backend Manifest Updated**",
              "embeds": [{
                "title": "Kubernetes Deployment Updated",
                "color": 5793266,
                "fields": [
                  {"name": "Service", "value": "Backend", "inline": true},
                  {"name": "Repository", "value": "terraform-eks-scg-demo", "inline": true},
                  {"name": "File", "value": "kubernetes/apps/weather-map/backend/deployment.yaml", "inline": false},
                  {"name": "New Image", "value": "`${{ steps.update-manifest.outputs.new_image }}`", "inline": false},
                  {"name": "Commit", "value": "chore: update backend image to prod-${{ steps.meta.outputs.timestamp }}", "inline": false}
                ]
              }]
            }' \
            https://discord.com/api/webhooks/1486690920761004093/a2sIUqGTl4KptVos4_WAaj8wIFnZgSSIlx9nLitspBM0z3qJCryw1ivUwdkVWn0u2VTe

      - name: Discord notification - Manifest update failed
        if: failure() && steps.update-manifest.outcome == 'failure'
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "❌ **Backend Manifest Update Failed**",
              "embeds": [{
                "title": "Failed to Update Kubernetes Deployment",
                "color": 15158332,
                "fields": [
                  {"name": "Service", "value": "Backend", "inline": true},
                  {"name": "Repository", "value": "terraform-eks-scg-demo", "inline": true},
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Error", "value": "Failed to clone repo or push changes. Check GIT_TOKEN secret.", "inline": false},
                  {"name": "Workflow", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }' \
            https://discord.com/api/webhooks/1486690920761004093/a2sIUqGTl4KptVos4_WAaj8wIFnZgSSIlx9nLitspBM0z3qJCryw1ivUwdkVWn0u2VTe
